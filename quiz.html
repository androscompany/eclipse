<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Grilă</title>

<style>

body {
    user-select: none;
}

body{
    margin:0;
    font-family:Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #fff1c1 0%,
        #ffd6a5 25%,
        #ffadad 50%,
        #ffd6e0 75%,
        #fff4e6 100%
    );

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:700px;
    max-width:90%;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-top:0;
}

.timer{
    font-size:24px;
    font-weight:bold;
    color:#E64A19;
    margin-bottom:20px;
}

.question{
    font-size:24px;
    margin-bottom:25px;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.answers button{
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;

    background:linear-gradient(90deg,#FFD54F,#FFA726,#FF7043);
    color:white;
    font-weight:bold;
    transition:0.2s;
}

.answers button:hover{
    transform:scale(1.03);
}

.feedback{
    margin-top:20px;
    font-size:26px;
    font-weight:bold;
    height:40px;
}

.result{
    font-size:45px;
    font-weight:bold;
    color:#E64A19;
}

</style>
</head>

<body>

<!-- 🔊 SUNETE -->
<audio id="goodSound">
    <source src="good.mp4" type="audio/mp4">
</audio>

<audio id="wrongSound">
    <source src="wrong.mp4" type="audio/mp4">
</audio>

<div class="card">

    <h1 id="title">Întrebarea 1 din 4</h1>

    <div class="timer">
        Timp rămas: <span id="timer">20</span>s
    </div>

    <div class="question" id="question"></div>

    <div class="answers" id="answers"></div>

    <div class="feedback" id="feedback"></div>

</div>

<script>

const questions = [
{
    text:"Umbra depinde de:",
    answers:["Vreme","Corpuri transparente","Poziția Soarelui"],
    correct:"C"
},
{
    text:"Eclipsa parțială se realizează atunci când:",
    answers:["Luna e lângă Soare","Luna acoperă o parte din Soare","Luna nu acoperă deloc Soarele"],
    correct:"B"
},
{
    text:"Corp transparent este:",
    answers:["Sticlă","Apa din fluvii","Nori"],
    correct:"A"
},
{
    text:"Penumbra nu apare cu ajutorul:",
    answers:["Surselor punctiforme","Surselor întinse","Unui loc întunecat"],
    correct:"C"
}
];

let current = 0;
let score = 0;
let time = 20;
let interval;
let answered = false;

const goodSound = document.getElementById("goodSound");
const wrongSound = document.getElementById("wrongSound");

function loadQuestion(){

    answered = false;

    if(current >= questions.length){
        showResult();
        return;
    }

    document.getElementById("title").textContent =
        "Întrebarea " + (current+1) + " din 4";

    document.getElementById("question").textContent =
        questions[current].text;

    document.getElementById("feedback").textContent = "";

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    const letters = ["A","B","C"];

    questions[current].answers.forEach((ans,index)=>{

        const btn = document.createElement("button");

        btn.textContent = letters[index] + ". " + ans;

        btn.onclick = () => checkAnswer(letters[index]);

        answersDiv.appendChild(btn);
    });

    startTimer();
}

function startTimer(){

    clearInterval(interval);

    time = 20;
    document.getElementById("timer").textContent = time;

    interval = setInterval(()=>{

        time--;
        document.getElementById("timer").textContent = time;

        if(time <= 0){

            clearInterval(interval);
            answered = true;

            document.getElementById("feedback").textContent = "Timp expirat!";
            document.getElementById("feedback").style.color = "orange";

            wrongSound.currentTime = 0;
            wrongSound.play();

            setTimeout(()=>{
                current++;
                loadQuestion();
            },1000);
        }

    },1000);
}

function checkAnswer(letter){

    if(answered) return;

    answered = true;

    document.querySelectorAll(".answers button")
        .forEach(btn => btn.disabled = true);

    clearInterval(interval);

    if(letter === questions[current].correct){

        score++;

        document.getElementById("feedback").textContent = "Corect!";
        document.getElementById("feedback").style.color = "green";

        goodSound.currentTime = 0;
        goodSound.play();

    } else {

        document.getElementById("feedback").textContent = "Greșit!";
        document.getElementById("feedback").style.color = "red";

        wrongSound.currentTime = 0;
        wrongSound.play();
    }

    setTimeout(()=>{
        current++;
        loadQuestion();
    },1000);
}

function showResult(){

    document.querySelector(".card").innerHTML =
    `<div class="result">
        Ai răspuns corect la ${score} din 4 întrebări!
    </div>`;
}

loadQuestion();

</script>

</body>
</html>
