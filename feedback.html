<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<style>

body {
    user-select: none;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    user-select:none;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* BACKGROUND */
.background{
    position:absolute;
    inset:0;
    background:url("poza5.png") center center/cover no-repeat;
}

/* OVERLAY */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(2px);
}

/* CONȚINUT */
.content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.about-link{
    position:fixed;
    bottom:20px;
    right:20px;
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    z-index:10;
    transition:0.3s;
}

.about-link:hover{
    opacity:0.8;
}

/* TITLU */
h1{
    margin-bottom:40px;
    font-size:55px;
    font-weight:bold;

    background:linear-gradient(90deg, #ffb74d, #ff7043, #fff176);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    transition:0.3s ease;
}

h1:hover{
    background:linear-gradient(90deg, #5d2e0c, #e64a19, #ff7043);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    transform:scale(1.05);
}

/* STELE */
.stars{
    display:flex;
    gap:12px;
    font-size:70px;
    cursor:pointer;
}

.star{
    color:#666;
    transition:0.25s;

    display:flex;
    justify-content:center;
    align-items:center;

    width:80px;
    height:80px;
    border-radius:18px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(4px);

    -webkit-text-stroke:2px black;
    text-shadow:0 2px 5px rgba(0,0,0,0.6);
}

.star:hover{
    transform:scale(1.15);
    background:rgba(255,255,255,0.3);
}

.star.active{
    color:gold;
    text-shadow:0 0 15px gold, 0 2px 5px rgba(0,0,0,0.6);
    background:rgba(255,215,0,0.15);
}

/* BUTON */
#sendBtn{
    margin-top:35px;
    padding:14px 35px;
    font-size:20px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-weight:bold;

    background:linear-gradient(90deg, #fff176, #ffb74d, #ff7043);
    color:#2d2d2d;

    box-shadow:0 8px 20px rgba(0,0,0,0.25);

    transition:0.3s;

    opacity:0;
    transform:translateY(15px);
    pointer-events:none;
}

#sendBtn.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
}

#sendBtn:hover{
    background:linear-gradient(90deg, #5d2e0c, #e64a19, #ff7043);
    color:white;
    transform:scale(1.08);
}

/* MESAJ */
#message{
    margin-top:25px;
    font-size:24px;
    color:white;
    text-shadow:0 0 10px rgba(0,0,0,0.6);
    max-width:700px;
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="content">

    <h1>Feedback</h1>

    <div class="stars" id="stars">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
    </div>

    <button id="sendBtn">Trimite!</button>

    <div id="message"></div>

</div>

<script>

const stars = document.querySelectorAll(".star");
const container = document.getElementById("stars");
const btn = document.getElementById("sendBtn");
const message = document.getElementById("message");

let selectedRating = 0;
let submitted = false;

stars.forEach(star => {

    star.addEventListener("mouseover", () => {
        if(submitted) return;
        highlightStars(parseInt(star.dataset.value));
    });

    star.addEventListener("click", () => {
        if(submitted) return;

        selectedRating = parseInt(star.dataset.value);
        highlightStars(selectedRating);
        btn.classList.add("show");
    });
});

container.addEventListener("mouseleave", () => {
    if(submitted) return;
    highlightStars(selectedRating);
});

function highlightStars(value){
    stars.forEach(star => {
        const starValue = parseInt(star.dataset.value);
        star.classList.toggle("active", starValue <= value);
    });
}

btn.addEventListener("click", () => {

    submitted = true;
    container.style.cursor = "default";
    btn.style.display = "none";

    switch(selectedRating){

        case 1:
            message.textContent = "Îmi pare rău pentru experiența neplăcută!";
            break;

        case 2:
            message.textContent = "Îmi pare rău că nu v-a plăcut site-ul!";
            break;

        case 3:
            message.textContent = "Mulțumesc! Îmi pare bine!";
            break;

        case 4:
            message.textContent = "Mulțumesc mult! V-a plăcut foarte mult site-ul!";
            break;

        case 5:
            message.textContent = "Uau! Mulțumesc din suflet!";
            break;

        default:
            message.textContent = "Vă rog să vă spuneți părerea!";
    }
});

</script>
<a href="site.html" class="about-link">Despre site</a>
</body>
</html>
