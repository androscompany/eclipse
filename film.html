<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>

body {
    user-select: none;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
}

video{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="film.mp4" type="video/mp4">
</video>

</body>
</html>
