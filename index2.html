<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipsele solare</title>

<style>

body {
    user-select: none;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    height:100vh;
    overflow:hidden;
    min-height:100dvh;
    background:linear-gradient(
        135deg,
        #fff1c1 0%,
        #ffd6a5 25%,
        #ffadad 50%,
        #ffd6e0 75%,
        #fff4e6 100%
    );
}

.sidebar{
    width:300px;
    height:100vh;

    background:linear-gradient(
        180deg,
        #FFD54F 0%,
        #FFA726 25%,
        #FF7043 55%,
        #E64A19 80%,
        #5D2E0C 100%
    );

    padding:25px;
    display:flex;
    flex-direction:column;
    gap:15px;

    box-shadow:6px 0 25px rgba(0,0,0,0.25);
}

.logo{
    color:white;
    font-size:28px;
    font-weight:700;
    text-align:center;
    margin-bottom:20px;
}

.menu-btn{
    display:block;
    background:rgba(255,255,255,0.12);
    border:2px solid rgba(255,255,255,0.5);
    color:white;
    text-decoration:none;
    font-size:22px;
    font-weight:600;
    padding:22px 20px;
    border-radius:18px;
    transition:all 0.25s ease;
    backdrop-filter:blur(8px);
}

.menu-btn::before{
    content:"✦ ";
}

.menu-btn:hover{
    transform:translateX(8px);
    background:rgba(255,255,255,0.22);
}

.content{
    flex:1;
    height:100vh;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<!-- 🎵 MUZICA -->
<audio id="bgMusic" loop>
    <source src="muz.mp3" type="audio/mpeg">
</audio>

<script>
let musicStarted = false;

function startMusicOnce(){
    if(!musicStarted){
        const music = document.getElementById("bgMusic");
        music.play().catch(() => {});
        musicStarted = true;
    }
}
</script>

<!-- MENIU -->
<div class="sidebar">

    <div class="logo">MENIU</div>

    <a class="menu-btn" href="film.html" target="pagina" onclick="startMusicOnce()">Acasă</a>
    <a class="menu-btn" href="umbra.html" target="pagina" onclick="startMusicOnce()">Umbra</a>
    <a class="menu-btn" href="penumbra.html" target="pagina" onclick="startMusicOnce()">Penumbra</a>
	<a class="menu-btn" href="fazeluni.html" target="pagina" onclick="startMusicOnce()">Fazele Lunii</a>
    <a class="menu-btn" href="eclipsele.html" target="pagina" onclick="startMusicOnce()">Eclipse</a>
    <a class="menu-btn" href="quiz.html" target="pagina" onclick="startMusicOnce()">Quiz</a>
    <a class="menu-btn" href="feedback.html" target="pagina" onclick="startMusicOnce()">Feedback</a>

</div>

<!-- CONTINUT -->
<div class="content">
    <iframe name="pagina" src="film.html"></iframe>
</div>

</body>
</html>
